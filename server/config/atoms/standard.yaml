# ============================================
# 普通因子 (N) — 积分 1
# ============================================
# 字段说明：
#   id             - 全局唯一标识符
#   category       - 所属分类（必须在 categories.yaml 中已定义）
#   prompt_chinese - 中文 SD prompt 片段
#   prompt_en      - 英文 SD prompt 片段
#   level          - 因子稀有度: N
#   score          - 积分值: 1
#   incompatible   - 互斥因子 id 列表（可选）
#   description    - 人类可读说明（可选）
# ============================================

